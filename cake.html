<!DOCTYPE html>
<html lang="ms" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ff8fab">
  <meta name="google" content="notranslate">
  <title>Cari Kek | Happy Birthday Sayang!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=48">
  <link rel="stylesheet" href="cake-game.css?v=48">
</head>
<body class="notranslate">

  <div class="bg-particles" id="bgParticles" aria-hidden="true"></div>

  <div class="progress" id="progress" aria-hidden="true">
    <a href="index.html" class="dot"></a>
    <a href="reasons.html" class="dot"></a>
    <a href="game.html" class="dot"></a>
    <a href="video.html" class="dot"></a>
    <a href="message.html" class="dot"></a>
    <a href="cake.html" class="dot active"></a>
  </div>

  <!-- STEP 7: CAKE HUNT FINALE -->
  <section class="slide active" id="slide-cake" aria-label="Cake hunt finale">
    <div class="card cake-card">
      <h2 class="section-title">Bantu Lotso Cari Keluarga 🧸</h2>
      <p class="section-subtitle">Cari semua ahli keluarga untuk buka pintu Bilik Makan…</p>

      <div class="room" id="room">
        <canvas class="game-canvas" id="gameCanvas" aria-label="Lotso beach birthday adventure"></canvas>
      </div>

      <!-- D-pad -->
      <div class="dpad" id="dpad">
        <button class="dpad-btn dpad-up" data-dir="up" aria-label="Atas">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5l10 16H2L12 5z"/></svg>
        </button>
        <div class="dpad-row">
          <button class="dpad-btn dpad-left" data-dir="left" aria-label="Kiri">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12l16-10v20L5 12z"/></svg>
          </button>
          <button class="dpad-btn dpad-down" data-dir="down" aria-label="Bawah">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19l10-16H2l10 16z"/></svg>
          </button>
          <button class="dpad-btn dpad-right" data-dir="right" aria-label="Kanan">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12L3 22V2l16 10z"/></svg>
          </button>
        </div>
      </div>

      <!-- NPC dialogue box -->
      <div class="dialogue-box" id="dialogueBox" aria-hidden="true">
        <div class="dialogue-name" id="dialogueName">Nama</div>
        <p class="dialogue-text" id="dialogueText">...</p>
      </div>

      <!-- Birthday wish console (replaces D-pad after cake found) -->
      <div class="birthday-console" id="birthdayConsole" aria-hidden="true">
        <div class="birthday-console-title">Happy Birthday Sayang! 🎂</div>
        <p class="birthday-console-text">
          Semoga hari ini penuh senyuman,<br>kebahagiaan, dan cinta yang tak terhingga. 💕
        </p>
        <button class="btn btn-primary" onclick="restartCakeGame()">Main Lagi 🔄</button>
      </div>

      <p class="cake-hint" id="cakeHint">Cari Abi, Kakak, Abang & Adik dulu.</p>

      <!-- Hidden celebration placeholder (kept for JS compatibility) -->
      <div class="celebration" id="celebration" aria-hidden="true" style="display:none;"></div>
    </div>
  </section>

  <!-- Hidden YouTube audio player (kept off-screen, not display:none so iframe isn't throttled) -->
  <div id="youtubePlayer" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;" aria-hidden="true"></div>

  <!-- Fallback birthday song audio -->
  <audio id="birthdaySong" preload="auto" aria-hidden="true">
    <source src="https://cdn.pixabay.com/audio/2022/02/21/audio_4e7e25d719.mp3" type="audio/mpeg">
  </audio>

  <button class="music-toggle muted" id="musicToggle" onclick="toggleMusic()" aria-label="Play music">
    🔇
  </button>
  <audio id="bgMusic" loop preload="metadata">
    <source src="assets/background-music.mp3" type="audio/mpeg">
  </audio>

  <div class="music-credit" title="Music credit">
    🎵 One Love Emotional Piano Strings
  </div>

  <script src="script.js?v=48"></script>
  <script src="cake-game.js?v=48"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
