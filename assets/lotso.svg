<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <radialGradient id="furLight" cx="35%" cy="25%" r="85%">
      <stop offset="0%" stop-color="#ffc2ce"/>
      <stop offset="55%" stop-color="#ff9eb0"/>
      <stop offset="100%" stop-color="#ff8fab"/>
    </radialGradient>
    <radialGradient id="earInner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe0e7"/>
      <stop offset="100%" stop-color="#ffc2ce"/>
    </radialGradient>
    <radialGradient id="snout" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff0f3"/>
      <stop offset="100%" stop-color="#ffd6e0"/>
    </radialGradient>
    <linearGradient id="strawberry" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff5e78"/>
      <stop offset="100%" stop-color="#e11d4b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="200" cy="455" rx="120" ry="16" fill="#5e2a35" opacity="0.12"/>

  <!-- Ears -->
  <circle cx="85" cy="95" r="60" fill="#e75480"/>
  <circle cx="315" cy="95" r="60" fill="#e75480"/>
  <circle cx="85" cy="95" r="38" fill="url(#earInner)"/>
  <circle cx="315" cy="95" r="38" fill="url(#earInner)"/>

  <!-- Arms (behind body) -->
  <ellipse cx="85" cy="340" rx="35" ry="55" fill="#ff8fab" transform="rotate(25 85 340)"/>
  <ellipse cx="315" cy="340" rx="35" ry="55" fill="#ff8fab" transform="rotate(-25 315 340)"/>

  <!-- Body -->
  <ellipse cx="200" cy="360" rx="145" ry="115" fill="url(#furLight)"/>

  <!-- Belly strawberry -->
  <ellipse cx="200" cy="365" rx="75" ry="62" fill="#fff0f3" opacity="0.45"/>
  <path d="M155 330 Q200 305 245 330 Q275 375 200 415 Q125 375 155 330" fill="url(#strawberry)" filter="url(#softShadow)"/>
  <path d="M200 308 L190 292 L200 300 L210 292 Z" fill="#4a8b2c"/>
  <path d="M182 295 L172 282 L182 290 Z" fill="#4a8b2c"/>
  <path d="M218 295 L228 282 L218 290 Z" fill="#4a8b2c"/>
  <!-- Strawberry seeds -->
  <circle cx="175" cy="345" r="3" fill="#ffd1dc" opacity="0.8"/>
  <circle cx="200" cy="340" r="3" fill="#ffd1dc" opacity="0.8"/>
  <circle cx="225" cy="345" r="3" fill="#ffd1dc" opacity="0.8"/>
  <circle cx="185" cy="370" r="3" fill="#ffd1dc" opacity="0.8"/>
  <circle cx="215" cy="370" r="3" fill="#ffd1dc" opacity="0.8"/>
  <circle cx="200" cy="390" r="3" fill="#ffd1dc" opacity="0.8"/>

  <!-- Feet -->
  <ellipse cx="130" cy="455" rx="38" ry="22" fill="#ff8fab"/>
  <ellipse cx="270" cy="455" rx="38" ry="22" fill="#ff8fab"/>
  <ellipse cx="130" cy="450" rx="20" ry="10" fill="#ffd6e0" opacity="0.6"/>
  <ellipse cx="270" cy="450" rx="20" ry="10" fill="#ffd6e0" opacity="0.6"/>

  <!-- Head -->
  <ellipse cx="200" cy="190" rx="150" ry="130" fill="url(#furLight)" filter="url(#softShadow)"/>

  <!-- Blush -->
  <ellipse cx="105" cy="235" rx="28" ry="18" fill="#ff4d6d" opacity="0.35"/>
  <ellipse cx="295" cy="235" rx="28" ry="18" fill="#ff4d6d" opacity="0.35"/>

  <!-- Eyes -->
  <ellipse cx="160" cy="175" rx="22" ry="30" fill="#2a1218"/>
  <ellipse cx="240" cy="175" rx="22" ry="30" fill="#2a1218"/>
  <circle cx="168" cy="165" r="8" fill="#fff"/>
  <circle cx="248" cy="165" r="8" fill="#fff"/>
  <circle cx="164" cy="172" r="3" fill="#fff" opacity="0.7"/>
  <circle cx="244" cy="172" r="3" fill="#fff" opacity="0.7"/>

  <!-- Snout -->
  <ellipse cx="200" cy="235" rx="60" ry="45" fill="url(#snout)"/>

  <!-- Nose -->
  <ellipse cx="200" cy="218" rx="24" ry="18" fill="#7a3e4f"/>
  <ellipse cx="205" cy="213" rx="7" ry="4" fill="#fff" opacity="0.35"/>

  <!-- Mouth -->
  <path d="M170 252 Q200 280 230 252" stroke="#5e2a35" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M190 270 Q200 275 210 270" stroke="#5e2a35" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Little strawberry in hand -->
  <g transform="translate(300, 310) rotate(-10)">
    <path d="M0 10 Q18 -5 36 10 Q48 38 18 58 Q-12 38 0 10" fill="url(#strawberry)"/>
    <path d="M18 5 L12 -8 L18 0 L24 -8 Z" fill="#4a8b2c"/>
    <circle cx="10" cy="22" r="2" fill="#ffd1dc"/>
    <circle cx="26" cy="22" r="2" fill="#ffd1dc"/>
    <circle cx="18" cy="36" r="2" fill="#ffd1dc"/>
  </g>
</svg>
