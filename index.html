<!DOCTYPE html>
<html lang="ms" translate="no">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

<body class="notranslate">

  <!-- Floating background particles -->
  <div class="bg-particles" id="bgParticles" aria-hidden="true"></div>

  <!-- Progress dots -->
  <div class="progress" id="progress" aria-hidden="true">
    <a href="index.html" class="dot active"></a>

        <img src="assets/lotso.svg" alt="Lotso strawberry bear">
